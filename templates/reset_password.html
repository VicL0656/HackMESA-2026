{% extends "base.html" %}
{% block title %}New password · GymLink{% endblock %}
{% block content %}
<div class="mx-auto max-w-md space-y-6 pt-8">
  <h1 class="text-2xl font-bold text-white">Choose a new password</h1>
  <form method="post" class="space-y-4 rounded-2xl border border-slate-800 bg-slate-900/60 p-4">
    <div>
      <label class="block text-xs font-medium text-slate-400" for="password">New password</label>
      <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password"
        class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500">
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-400" for="password_confirm">Confirm</label>
      <input id="password_confirm" name="password_confirm" type="password" required minlength="8" autocomplete="new-password"
        class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500">
    </div>
    <button type="submit" class="w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white hover:bg-brand-500">Save password</button>
  </form>
</div>
{% endblock %}
