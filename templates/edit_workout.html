{% extends "base.html" %}
{% block title %}Edit workout · GymLink{% endblock %}
{% block content %}
<div class="space-y-5">
  <div>
    <h1 class="text-xl font-bold text-white">Edit lift</h1>
    <p class="mt-1 text-sm text-slate-400">Saving recalculates your PRs and streak from full history.</p>
  </div>

  <form method="post" enctype="multipart/form-data" class="space-y-4 rounded-2xl border border-slate-800 bg-slate-900/60 p-4 shadow-xl">
    <div>
      <label class="block text-xs font-medium text-slate-400" for="exercise_name">Exercise</label>
      <input id="exercise_name" name="exercise_name" required maxlength="120" value="{{ workout.exercise_name }}"
        class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-brand-500 focus:border-brand-500 focus:ring-2">
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-medium text-slate-400" for="weight_lbs">Weight (lb)</label>
        <input id="weight_lbs" name="weight_lbs" inputmode="decimal" required value="{{ workout.weight_lbs }}"
          class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-brand-500 focus:border-brand-500 focus:ring-2">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-400" for="reps">Reps</label>
        <input id="reps" name="reps" inputmode="numeric" type="number" min="1" step="1" required value="{{ workout.reps }}"
          class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-brand-500 focus:border-brand-500 focus:ring-2">
      </div>
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-400" for="caption">Caption</label>
      <textarea id="caption" name="caption" rows="2" maxlength="2000"
        class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-brand-500 focus:border-brand-500 focus:ring-2">{{ workout.caption or '' }}</textarea>
    </div>
    {% if workout.photo_path %}
    <p class="text-xs text-slate-500">Current photo:</p>
    <img src="{{ workout.photo_path|media_url }}" alt="" class="mt-1 max-h-40 rounded-lg border border-slate-800 object-cover">
    {% endif %}
    <div>
      <label class="block text-xs font-medium text-slate-400" for="photo">Replace photo (optional)</label>
      <input id="photo" name="photo" type="file" accept="image/*"
        class="mt-1 block w-full text-xs text-slate-300 file:mr-3 file:rounded-lg file:border-0 file:bg-slate-800 file:px-3 file:py-1.5 file:text-xs file:font-semibold file:text-white">
    </div>
    <button type="submit" class="w-full rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-500">Save changes</button>
  </form>
  <p class="text-center text-xs">
    <a href="{{ url_for('social.feed') }}" class="text-slate-500 hover:text-slate-300">Cancel</a>
  </p>
</div>
{% endblock %}
