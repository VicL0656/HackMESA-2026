{% extends "base.html" %}
{% block title %}Forgot password · GymLink{% endblock %}
{% block content %}
<div class="mx-auto max-w-md space-y-6 pt-8">
  <h1 class="text-2xl font-bold text-white">Reset password</h1>
  <p class="text-sm text-slate-400">Enter the email you use to log in, your <span class="font-mono text-slate-300">.edu</span> sign-in if you use that, or your <span class="font-mono text-slate-300">@username</span>. If it matches an account, we will email a reset link.</p>
  <form method="post" class="space-y-4 rounded-2xl border border-slate-800 bg-slate-900/60 p-4">
    <div>
      <label class="block text-xs font-medium text-slate-400" for="identifier">Email or username</label>
      <input id="identifier" name="identifier" type="text" required autocomplete="username"
        class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500">
    </div>
    <button type="submit" class="w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white hover:bg-brand-500">Send reset link</button>
  </form>
  <p class="text-center text-sm text-slate-500"><a href="{{ url_for('auth.login') }}" class="text-brand-500 hover:text-brand-400">Back to login</a></p>
</div>
{% endblock %}
